name: build-derper

on:
  workflow_dispatch:
    inputs:
      tailscale_version:
        description: Optional upstream tag, e.g. v1.96.4
        required: false
      force:
        description: Force rebuild
        type: boolean
        default: false
  schedule:
    - cron: '18 3 * * *'

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/derper
      REQUESTED_VERSION: ${{ github.event.inputs.tailscale_version || '' }}
      FORCE_BUILD: ${{ github.event.inputs.force || 'false' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - id: versions
        run: |
          set -euo pipefail

          if [ -n "${REQUESTED_VERSION}" ]; then
            tailscale_version="${REQUESTED_VERSION}"
          else
            tailscale_version="$(curl -fsSL https://api.github.com/repos/tailscale/tailscale/releases/latest | jq -r '.tag_name')"
          fi
          if [ -z "${tailscale_version}" ] || [ "${tailscale_version}" = "null" ]; then
            echo "::error::Failed to determine Tailscale version"
            exit 1
          fi

          lego_version="$(curl -fsSL https://api.github.com/repos/go-acme/lego/releases/latest | jq -r '.tag_name')"
          if [ -z "${lego_version}" ] || [ "${lego_version}" = "null" ]; then
            echo "::error::Failed to determine lego version"
            exit 1
          fi

          for v in "${tailscale_version}" "${lego_version}"; do
            if ! printf '%s' "${v}" | grep -Eq '^v[0-9]+\.[0-9]+'; then
              echo "::error::Invalid version format: ${v}"
              exit 1
            fi
          done

          echo "tailscale=${tailscale_version}" >> "$GITHUB_OUTPUT"
          echo "lego=${lego_version}" >> "$GITHUB_OUTPUT"

      - id: marker
        run: |
          set -euo pipefail
          marker="upstream-${{ steps.versions.outputs.tailscale }}"
          if git ls-remote --exit-code --tags origin "refs/tags/${marker}" >/dev/null 2>&1 && [ "${FORCE_BUILD}" != "true" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "tag=${marker}" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.marker.outputs.skip == 'false'
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - if: steps.marker.outputs.skip == 'false'
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - if: steps.marker.outputs.skip == 'false'
        name: Build standalone Linux bundles
        env:
          TAILSCALE_VERSION: ${{ steps.versions.outputs.tailscale }}
          LEGO_VERSION: ${{ steps.versions.outputs.lego }}
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist
          : > dist/SHA256SUMS

          for arch in amd64 arm64; do
            rootfs="dist/rootfs-${arch}"
            package="derper-${TAILSCALE_VERSION}-linux-${arch}"

            docker buildx build \
              --platform "linux/${arch}" \
              --target portable \
              --build-arg "TAILSCALE_VERSION=${TAILSCALE_VERSION}" \
              --build-arg "LEGO_VERSION=${LEGO_VERSION}" \
              --output "type=local,dest=${rootfs}" \
              .

            mkdir -p "dist/${package}"
            cp -a "${rootfs}/derper" "dist/${package}/derper"
            cp -a "${rootfs}/lego" "dist/${package}/lego"
            cp -a "${rootfs}/derper-run" "dist/${package}/derper-run"
            cp -a "${rootfs}/install.sh" "dist/${package}/install.sh"
            cp -a "${rootfs}/derper.toml" "dist/${package}/derper.toml"
            cp -a "${rootfs}/env.example" "dist/${package}/env.example"
            cp -a "${rootfs}/README.md" "dist/${package}/README.md"

            tar -C dist -czf "dist/${package}.tar.gz" "${package}"
            ( cd dist && sha256sum "${package}.tar.gz" >> SHA256SUMS )
          done

      - if: steps.marker.outputs.skip == 'false'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - if: steps.marker.outputs.skip == 'false'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.versions.outputs.tailscale }}
          build-args: |
            TAILSCALE_VERSION=${{ steps.versions.outputs.tailscale }}
            LEGO_VERSION=${{ steps.versions.outputs.lego }}

      - if: steps.marker.outputs.skip == 'false'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "${{ steps.marker.outputs.tag }}"
          git push --force origin "${{ steps.marker.outputs.tag }}"

      - if: steps.marker.outputs.skip == 'false'
        name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.marker.outputs.tag }}
          TAILSCALE_VERSION: ${{ steps.versions.outputs.tailscale }}
          LEGO_VERSION: ${{ steps.versions.outputs.lego }}
        run: |
          set -euo pipefail
          cat > dist/release-notes.md <<EOF
          Tailscale derper ${TAILSCALE_VERSION}

          Assets:
          - ghcr.io/${{ github.repository_owner }}/derper:${TAILSCALE_VERSION}
          - derper-${TAILSCALE_VERSION}-linux-amd64.tar.gz
          - derper-${TAILSCALE_VERSION}-linux-arm64.tar.gz

          Bundles include derper, lego ${LEGO_VERSION}, install.sh, the portable runner, and sample configuration.
          EOF

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" dist/*.tar.gz dist/SHA256SUMS --clobber
          else
            gh release create "${RELEASE_TAG}" dist/*.tar.gz dist/SHA256SUMS \
              --title "derper ${TAILSCALE_VERSION}" \
              --notes-file dist/release-notes.md
          fi

      - if: steps.marker.outputs.skip == 'true'
        run: echo "No new upstream release."
